<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lista de Compras — Grano Serrano</title>
<style>
  :root{
    --bg:#FAF6EF;
    --surface:#FFFFFF;
    --ink:#2B2620;
    --ink-soft:#6B6256;
    --line:#E5DDCC;
    --tomato:#C2410C;
    --tomato-soft:#FCE8DC;
    --basil:#3F6B3A;
    --basil-soft:#E3EEDD;
    --warn:#B45309;
    --warn-soft:#FDF1DC;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    -webkit-tap-highlight-color:transparent;
  }
  .wrap{
    max-width:480px;
    margin:0 auto;
    padding:16px 16px 32px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  header{
    padding:8px 0 16px;
    border-bottom:1px solid var(--line);
    margin-bottom:16px;
  }
  .brand{
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--tomato);
    font-weight:600;
    margin:0 0 4px;
  }
  h1{
    font-size:22px;
    font-weight:600;
    margin:0;
    color:var(--ink);
  }
  .stats{
    display:flex;
    gap:10px;
    margin-bottom:14px;
  }
  .stat{
    flex:1;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    padding:10px 12px;
  }
  .stat .num{font-size:20px;font-weight:700;line-height:1;}
  .stat .lbl{font-size:11px;color:var(--ink-soft);margin-top:2px;}
  .progress-track{
    height:8px;
    background:var(--line);
    border-radius:99px;
    overflow:hidden;
    margin-bottom:18px;
  }
  .progress-fill{
    height:100%;
    background:var(--basil);
    border-radius:99px;
    transition:width .25s ease;
  }
  .controls{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:18px;
  }
  input[type=text]{
    width:100%;
    padding:13px 14px;
    font-size:15px;
    border:1px solid var(--line);
    border-radius:12px;
    background:var(--surface);
    color:var(--ink);
  }
  input[type=text]:focus{outline:2px solid var(--tomato);outline-offset:1px;}
  .chips{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:4px;
    -ms-overflow-style:none;
    scrollbar-width:none;
  }
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;
    padding:8px 14px;
    font-size:13px;
    font-weight:500;
    border-radius:99px;
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--ink-soft);
    white-space:nowrap;
    cursor:pointer;
  }
  .chip.active{
    background:var(--tomato);
    border-color:var(--tomato);
    color:#fff;
  }
  .stage{flex:1;display:flex;flex-direction:column;justify-content:center;}
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:20px;
    padding:36px 22px;
    text-align:center;
    min-height:220px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:14px;
    box-shadow:0 1px 0 rgba(0,0,0,.02);
  }
  .cat-pill{
    display:inline-block;
    align-self:center;
    background:var(--tomato-soft);
    color:var(--tomato);
    font-size:12px;
    font-weight:600;
    padding:6px 14px;
    border-radius:99px;
  }
  .prod-name{
    font-size:28px;
    font-weight:700;
    color:var(--ink);
    line-height:1.25;
    margin:0;
  }
  .actions{
    display:flex;
    gap:8px;
    margin-top:20px;
  }
  button{
    font-family:inherit;
    cursor:pointer;
    border:none;
  }
  .btn{
    flex:1;
    height:60px;
    border-radius:16px;
    font-size:15px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    padding:0 4px;
  }
  .btn-skip{
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--ink-soft);
  }
  .btn-skip:active{background:var(--bg);}
  .btn-next{
    background:var(--tomato-soft);
    border:1px solid var(--tomato-soft);
    color:var(--tomato);
  }
  .btn-next:active{background:#F5D5C0;}
  .btn-buy{
    background:var(--basil);
    color:#fff;
  }
  .btn-buy:active{background:#345a30;}
  .btn-reset{
    width:100%;
    height:56px;
    border-radius:14px;
    background:var(--ink);
    color:#fff;
    font-size:15px;
    font-weight:600;
    margin-top:10px;
  }
  .btn-undo{
    width:100%;
    height:44px;
    border-radius:12px;
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink-soft);
    font-size:13px;
    font-weight:500;
    margin-top:10px;
  }
  .stock-row{
    display:flex;
    gap:8px;
    margin-top:18px;
  }
  .stock-input{
    flex:1;
    height:48px;
    padding:0 14px;
    font-size:15px;
    border:1px solid var(--line);
    border-radius:12px;
    background:var(--bg);
    color:var(--ink);
  }
  .stock-input:focus{outline:2px solid var(--basil);outline-offset:1px;}
  .btn-save-stock{
    width:48px;
    height:48px;
    border-radius:12px;
    background:var(--ink);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    flex:0 0 auto;
  }
  .btn-save-stock:active{background:#000;}
  .btn-save-stock svg{width:20px;height:20px;}
  .estoque-info{
    margin-top:8px;
    font-size:12px;
    color:var(--ink-soft);
    text-align:left;
  }
  .estoque-info.saved{color:var(--basil);font-weight:600;}
  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
  }
  .empty .big{font-size:40px;margin-bottom:8px;}
  .empty p{font-size:15px;margin:0 0 16px;}
  .done-list{
    margin-top:16px;
    max-height:280px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .done-item{
    padding:10px 12px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:10px;
    font-size:14px;
    color:var(--ink-soft);
    text-decoration:line-through;
  }
  .pending-item{
    padding:10px 12px;
    background:var(--warn-soft);
    border-left:3px solid var(--warn);
    border-radius:0 10px 10px 0;
    font-size:14px;
    color:var(--ink);
  }
  .section-title{
    font-size:13px;
    font-weight:600;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:.05em;
    margin:18px 0 8px;
  }
  .lista-compras-section{margin-top:20px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;}
  .lista-compras-section h2{font-size:15px;font-weight:700;margin:0 0 10px;color:var(--ink);}
  .lista-compras-itens{list-style:none;margin:0 0 12px;padding:0;}
  .lista-compras-itens li{padding:7px 0;border-bottom:1px solid var(--line);font-size:14px;display:flex;justify-content:space-between;align-items:center;}
  .lista-compras-itens li:last-child{border-bottom:none;}
  .lista-compras-itens .cat-badge{font-size:11px;color:var(--ink-soft);background:var(--bg);border-radius:5px;padding:2px 6px;}
  .lista-vazia{font-size:13px;color:var(--ink-soft);text-align:center;padding:10px 0;justify-content:center !important;}
  .btn-whatsapp{width:100%;height:50px;border-radius:12px;background:#25D366;color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;}
  .btn-whatsapp:active{background:#1ebe5d;}
  .btn-limpar-lista{width:100%;height:38px;border-radius:10px;background:transparent;border:1px solid var(--line);color:var(--ink-soft);font-size:13px;cursor:pointer;margin-top:6px;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <p class="brand">Grano Serrano</p>
    <h1 id="title">Lista de compras</h1>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="num" id="statComprados">0</div>

  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <div class="controls">

    <div class="chips" id="chips"></div>

  <div class="stage" id="stage"></div>

  <div class="lista-compras-section" id="listaComprasSection">

</div>

const STORAGE_KEY = "grano_serrano_lista_compras_v1";

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(!parsed.estoque) parsed.estoque = {};
      return parsed;
    }
  }catch(e){}
  return { comprados: [], data: todayStr(), estoque: {} };
}

function todayStr(){
  const d = new Date();
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

let state = loadState();

if(state.data !== todayStr()){
  state.comprados = [];
  state.data = todayStr();
  saveState();
}

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    console.warn("Não foi possível salvar localmente:", e);
  }
}

let filtroCategoria = "Todos";
let busca = "";
let indice = 0;

const categorias = ["Todos", ...new Set(INSUMOS.map(i => i.cat))];

function getFiltrados(){
  let r = INSUMOS;
  if(filtroCategoria !== "Todos") r = r.filter(i => i.cat === filtroCategoria);
  if(busca) r = r.filter(i => i.prod.toLowerCase().includes(busca.toLowerCase()));
  return r.filter(i => !state.comprados.includes(i.id));
}

function renderChips(){
  const el = document.getElementById("chips");
  el.innerHTML = "";
  categorias.forEach(cat => {
    const chip = document.createElement("button");
    chip.className = "chip" + (filtroCategoria === cat ? " active" : "");
    chip.textContent = cat;
    chip.onclick = () => { filtroCategoria = cat; indice = 0; render(); };
    el.appendChild(chip);
  });
}

function renderStats(){
  const total = INSUMOS.length;
  const comprados = state.comprados.length;
  const pct = Math.round((comprados/total)*100);
  document.getElementById("statComprados").textContent = comprados;
  document.getElementById("statRestam").textContent = total - comprados;
  document.getElementById("statPct").textContent = pct + "%";
  document.getElementById("progressFill").style.width = pct + "%";
}

function adicionarALista(id){
  const item = INSUMOS.find(i => i.id === id);
  if(!item) return;
  if(!state.listaCompras) state.listaCompras = [];
  if(!state.listaCompras.find(i => i.id === id)){
    state.listaCompras.push({id:item.id,cat:item.cat,prod:item.prod});
  }
  state.comprados.push(id);
  saveState();
  renderListaCompras();
  render();
}

function avancarSemComprar(id){
  state.comprados.push(id);
  saveState();
  render();
}

function desfazerUltimo(){
  const lastId = state.comprados.pop();
  if(lastId !== undefined){
    if(!state.listaCompras) state.listaCompras = [];
    state.listaCompras = state.listaCompras.filter(i => i.id !== lastId);
  }
  saveState();
  renderListaCompras();
  render();
}

function salvarEstoque(id, valor){
  const qtd = parseFloat(valor);
  if(isNaN(qtd) || qtd < 0) return false;
  state.estoque[id] = { qtd: qtd, atualizadoEm: new Date().toISOString() };
  saveState();
  return true;
}

function formatarData(iso){
  const d = new Date(iso);
  const dia = String(d.getDate()).padStart(2,"0");
  const mes = String(d.getMonth()+1).padStart(2,"0");
  return dia + "/" + mes;
}

function resetarTudo(){
  state.comprados = [];
  state.data = todayStr();
  saveState();
  filtroCategoria = "Todos";
  busca = "";
  document.getElementById("busca").value = "";
  indice = 0;
  render();
}

function renderStage(){
  const stage = document.getElementById("stage");
  const filtrados = getFiltrados();

  if(filtrados.length === 0){
    const totalComprados = state.comprados.length;
    const todosComprados = totalComprados === INSUMOS.length;

    if(todosComprados){
      stage.innerHTML = `
        <div class="empty">
          <div class="big">✓</div>
          <p>Lista concluída! Todos os ${INSUMOS.length} insumos foram comprados.</p>
          <button class="btn-reset" id="btnReset">Começar nova lista</button>
        </div>`;
      document.getElementById("btnReset").onclick = resetarTudo;
    } else {
      stage.innerHTML = `
        <div class="empty">
          <div class="big">—</div>
          <p>Nenhum produto encontrado com esse filtro.</p>
          <button class="btn-reset" id="btnClear">Limpar filtros</button>
        </div>`;
      document.getElementById("btnClear").onclick = () => {
        filtroCategoria = "Todos"; busca = "";
        document.getElementById("busca").value = "";
        indice = 0; render();
      };
    }
    return;
  }

  if(indice >= filtrados.length) indice = 0;
  const item = filtrados[indice];
  const registroAtual = state.estoque[item.id];

  stage.innerHTML = `
    <div class="card">
      <span class="cat-pill">${item.cat}</span>
      <p class="prod-name">${item.prod}</p>
      <div class="stock-row">
        <input type="number" inputmode="decimal" min="0" step="0.1" class="stock-input" id="estoqueInput" placeholder="Qtd. em estoque" value="${registroAtual ? registroAtual.qtd : ''}">
        <button class="btn-save-stock" id="btnSalvarEstoque" aria-label="Salvar estoque">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        </button>
      </div>
      <p class="estoque-info" id="estoqueInfo">${registroAtual ? "Registrado: " + registroAtual.qtd + " em " + formatarData(registroAtual.atualizadoEm) : "Nenhum estoque registrado ainda"}</p>
    </div>
    <div class="actions">
      <button class="btn btn-skip" id="btnSkip">Pular</button>
      <button class="btn btn-next" id="btnNext">Próximo</button>
      <button class="btn btn-buy" id="btnBuy">Comprar</button>
    </div>
    ${state.comprados.length > 0 ? '<button class="btn-undo" id="btnUndo">Desfazer última compra</button>' : ''}
  `;

  document.getElementById("btnSkip").onclick = () => {
    indice = (indice + 1) % filtrados.length;
    render();
  };
  document.getElementById("btnNext").onclick = () => avancarSemComprar(item.id);
  document.getElementById("btnBuy").onclick = () => adicionarALista(item.id);
  document.getElementById("btnSalvarEstoque").onclick = () => {
    const input = document.getElementById("estoqueInput");
    const ok = salvarEstoque(item.id, input.value);
    const info = document.getElementById("estoqueInfo");
    if(ok){
      const reg = state.estoque[item.id];
      info.textContent = "Registrado: " + reg.qtd + " em " + formatarData(reg.atualizadoEm);
      info.classList.add("saved");
      setTimeout(() => info.classList.remove("saved"), 1200);
    } else {
      info.textContent = "Informe uma quantidade válida";
    }
  };
  const undoBtn = document.getElementById("btnUndo");
  if(undoBtn) undoBtn.onclick = desfazerUltimo;
}

function render(){
  renderChips();
  renderStats();
  renderStage();
}

document.getElementById("busca").addEventListener("input", (e) => {
  busca = e.target.value;
  indice = 0;
  render();
});


function renderListaCompras(){
  const ul = document.getElementById("listaComprasItens");
  if(!ul) return;
  ul.innerHTML = "";
  const lista = state.listaCompras || [];
  if(lista.length === 0){
    const li = document.createElement("li");
    li.className = "lista-vazia";
    li.textContent = "Nenhum item adicionado ainda.";
    ul.appendChild(li);
    return;
  }
  lista.forEach(item => {
    const li = document.createElement("li");
    const span1 = document.createElement("span");
    span1.textContent = item.prod;
    const span2 = document.createElement("span");
    span2.className = "cat-badge";
    span2.textContent = item.cat;
    li.appendChild(span1);
    li.appendChild(span2);
    ul.appendChild(li);
  });
}

function enviarWhatsapp(){
  const lista = state.listaCompras || [];
  if(lista.length === 0){
    alert("Adicione itens à lista antes de enviar.");
    return;
  }
  const linhas = ["Lista de Compras - Grano Serrano", ""];
  let catAtual = "";
  lista.forEach(item => {
    if(item.cat !== catAtual){
      catAtual = item.cat;
      linhas.push("*" + catAtual + "*");
    }
    linhas.push("- " + item.prod);
  });
  linhas.push("");
  linhas.push("Gerado em " + new Date().toLocaleDateString("pt-BR"));
  const msg = encodeURIComponent(linhas.join("\n"));
  window.open("https://wa.me/?text=" + msg, "_blank");
}

document.getElementById("btnWhatsapp").onclick = enviarWhatsapp;

document.getElementById("btnLimparLista").onclick = function(){
  if(!state.listaCompras || state.listaCompras.length === 0) return;
  if(confirm("Limpar a lista de compras?")){
    state.listaCompras = [];
    saveState();
    renderListaCompras();
  }
};

render();
renderListaCompras();
</script>
</body>
</html>
